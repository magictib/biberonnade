<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tétées</title>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #6c5ce7;
      --bg: #f0effe;
      --card: #ffffff;
      --text: #2d3436;
      --muted: #636e72;
      --border: #dfe6e9;
      --r: 16px;
      --shadow: 0 4px 20px rgba(108,92,231,.1);
      --teal: #00b894;
      --orange: #e17055;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 160px; }

    header { background: var(--primary); color: #fff; padding: 20px 16px 22px; text-align: center; }
    header h1 { font-size: 1.5rem; font-weight: 800; }
    .stats-bar { display: flex; justify-content: center; gap: 7px; margin-top: 11px; flex-wrap: wrap; }
    .chip { background: rgba(255,255,255,.22); border-radius: 20px; padding: 5px 11px; font-size: .76rem; }
    .chip strong { font-weight: 700; }

    .fab {
      position: fixed; bottom: 76px; right: 24px;
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--primary); color: #fff; font-size: 2rem; border: none;
      box-shadow: 0 6px 24px rgba(108,92,231,.45);
      cursor: pointer; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s;
    }
    .fab:active { transform: scale(.92); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,.06);
    }
    .nav-btn {
      flex: 1; border: none; background: none; cursor: pointer; font-family: inherit;
      font-size: .72rem; font-weight: 600; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      transition: color .15s;
    }
    .nav-btn .nav-icon { font-size: 1.4rem; }
    .nav-btn.active { color: var(--primary); }

    /* ── Journal ── */
    main { padding: 16px; max-width: 600px; margin: 0 auto; }
    .day-group { margin-bottom: 22px; }
    .day-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; padding: 0 4px; }
    .entry-card {
      background: var(--card); border-radius: var(--r);
      padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 13px;
      cursor: pointer; transition: transform .1s;
    }
    .entry-card:active { transform: scale(.98); }
    .entry-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 1.45rem; flex-shrink: 0; }
    .icon-sein_gauche    { background: #ffeef5; }
    .icon-sein_droit     { background: #f0effe; }
    .icon-les_deux       { background: #fff9e6; }
    .icon-biberon        { background: #e6faf5; }
    .icon-biberon_poudre { background: #fff0eb; }
    .entry-body { flex: 1; min-width: 0; }
    .entry-type { font-weight: 700; font-size: .95rem; margin-bottom: 2px; }
    .entry-meta { font-size: .81rem; color: var(--muted); }
    .entry-comment { font-size: .81rem; color: var(--muted); font-style: italic; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-time { font-size: 1.15rem; font-weight: 800; color: var(--primary); flex-shrink: 0; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.38);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 12px 20px 40px; width: 100%; max-width: 600px;
      transform: translateY(110%);
      transition: transform .3s cubic-bezier(.34,1.4,.64,1);
      max-height: 92vh; overflow-y: auto;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 8px auto 20px; }
    .sheet h2 { font-size: 1.15rem; font-weight: 800; text-align: center; margin-bottom: 22px; }

    .fg { margin-bottom: 16px; }
    .lbl { display: block; font-size: .76rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
    input[type="datetime-local"], input[type="number"], textarea {
      width: 100%; padding: 13px 14px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 1rem; font-family: inherit; color: var(--text);
      background: #fff; transition: border-color .15s; -webkit-appearance: none; appearance: none;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: none; }

    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .type-btn {
      padding: 13px 8px; border: 2px solid var(--border); border-radius: 13px;
      background: #fff; cursor: pointer; font-family: inherit;
      font-size: .83rem; font-weight: 600; color: var(--text);
      transition: all .14s; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .type-btn span { font-size: 1.5rem; }
    .type-btn.sel-sein_gauche { border-color: #fd79a8; background: #ffeef5; color: #c0296a; }
    .type-btn.sel-sein_droit  { border-color: #a29bfe; background: #f0effe; color: #4a3abf; }
    .type-btn.sel-les_deux    { border-color: #e0ac00; background: #fff9e6; color: #7a5800; }
    .type-btn.sel-biberon     { border-color: #00b894; background: #e6faf5; color: #006e59; }

    /* Biberon sous-type */
    .bib-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .bib-btn {
      padding: 11px 8px; border: 2px solid var(--border); border-radius: 13px;
      background: #fff; cursor: pointer; font-family: inherit;
      font-size: .83rem; font-weight: 600; color: var(--text);
      transition: all .14s; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .bib-btn span { font-size: 1.3rem; }
    .bib-btn.sel-maternel { border-color: #00b894; background: #e6faf5; color: #006e59; }
    .bib-btn.sel-poudre   { border-color: #e17055; background: #fff0eb; color: #a84432; }

    .cond { display: none; }
    .cond.show { display: block; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 13px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-cancel  { background: var(--bg); color: var(--text); }
    .btn-delete  { width: 100%; margin-top: 10px; background: #fff0f0; color: #c0392b; }

    .sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00b894; margin-right: 4px; vertical-align: middle; }
    .sync-dot.off { background: #fdcb6e; }

    .empty { text-align: center; padding: 70px 20px; color: var(--muted); }
    .empty .ei { font-size: 4rem; margin-bottom: 16px; }
    .empty p { font-size: 1rem; line-height: 1.6; }

    /* ── Stats view ── */
    .stats-page { padding: 16px; max-width: 600px; margin: 0 auto; }

    .period-row, .chart-mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .period-btn, .mode-btn {
      flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 12px;
      background: #fff; cursor: pointer; font-family: inherit;
      font-size: .85rem; font-weight: 700; color: var(--muted); transition: all .14s;
    }
    .mode-btn { font-size: .8rem; padding: 8px; border-radius: 10px; }
    .period-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }
    .mode-btn.active   { border-color: var(--primary); background: var(--bg); color: var(--primary); }

    .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: .75rem; color: var(--muted); font-weight: 600; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    .chart-scroll-wrap {
      background: var(--card); border-radius: var(--r);
      padding: 14px 10px 8px; box-shadow: var(--shadow);
      overflow-x: auto; margin-bottom: 20px;
      -webkit-overflow-scrolling: touch;
    }
    .chart-scroll-wrap svg { display: block; }

    .day-stat-card { background: var(--card); border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .dsc-date { font-weight: 700; font-size: .9rem; margin-bottom: 10px; }
    .dsc-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .dsc-item { background: var(--bg); border-radius: 10px; padding: 8px 12px; min-width: 90px; flex: 1; }
    .dsc-item-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
    .dsc-item-val { font-size: 1.05rem; font-weight: 800; color: var(--text); }
    .dsc-item.c-sein     .dsc-item-val { color: #a29bfe; }
    .dsc-item.c-maternel .dsc-item-val { color: var(--teal); }
    .dsc-item.c-poudre   .dsc-item-val { color: var(--orange); }
  </style>
</head>
<body>

<header>
  <h1>🍼 Tétées</h1>
  <div class="stats-bar">
    <div class="chip">Aujourd'hui&nbsp;: <strong id="cnt">0</strong></div>
    <div class="chip">Dernière&nbsp;: <strong id="ago">—</strong></div>
    <div class="chip">Dernier poudre&nbsp;: <strong id="ago-poudre">—</strong></div>
    <div class="chip"><span class="sync-dot off" id="dot"></span><span id="sync-lbl">Connexion…</span></div>
  </div>
</header>

<!-- Journal -->
<div id="view-journal">
  <main id="list">
    <div class="empty" id="empty">
      <div class="ei">🤱</div>
      <p>Aucune tétée enregistrée.<br>Appuyez sur <strong>+</strong> pour commencer !</p>
    </div>
  </main>
</div>

<!-- Stats -->
<div id="view-stats" style="display:none">
  <div class="stats-page">
    <div class="period-row">
      <button class="period-btn active" data-period="7">7 jours</button>
      <button class="period-btn" data-period="30">30 jours</button>
    </div>
    <div class="chart-mode-row">
      <button class="mode-btn active" data-mode="count">Nb tétées</button>
      <button class="mode-btn" data-mode="volume">Volume ml</button>
    </div>
    <div class="chart-legend" id="chart-legend"></div>
    <div class="chart-scroll-wrap">
      <div id="chart-svg"></div>
    </div>
    <div id="day-cards"></div>
  </div>
</div>

<button class="fab" id="fab">+</button>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-journal">
    <span class="nav-icon">🍼</span>Journal
  </button>
  <button class="nav-btn" id="nav-stats">
    <span class="nav-icon">📊</span>Stats
  </button>
</nav>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="modal-title">Nouvelle tétée</h2>
    <form id="form" novalidate>
      <div class="fg">
        <div class="lbl">Type</div>
        <div class="type-grid" id="type-grid">
          <button type="button" class="type-btn" data-type="sein_gauche"><span>🤱</span>Sein gauche</button>
          <button type="button" class="type-btn" data-type="sein_droit"><span>🤱</span>Sein droit</button>
          <button type="button" class="type-btn" data-type="les_deux"><span>🤱</span>Les deux</button>
          <button type="button" class="type-btn" data-type="biberon"><span>🍼</span>Biberon</button>
        </div>
      </div>
      <div class="fg cond" id="g-bib-type">
        <div class="lbl">Type de biberon</div>
        <div class="bib-type-row" id="bib-type-grid">
          <button type="button" class="bib-btn" data-bib="maternel"><span>🍼</span>Lait maternel</button>
          <button type="button" class="bib-btn" data-bib="poudre"><span>🥛</span>Lait en poudre</button>
        </div>
      </div>
      <div class="fg">
        <label class="lbl" for="f-dt">Date et heure</label>
        <input type="datetime-local" id="f-dt" required>
      </div>
      <div class="fg cond" id="g-dur">
        <label class="lbl" for="f-dur">Durée (minutes)</label>
        <input type="number" id="f-dur" min="1" max="120" placeholder="ex : 20">
      </div>
      <div class="fg cond" id="g-qty">
        <label class="lbl" for="f-qty">Quantité (ml)</label>
        <input type="number" id="f-qty" min="1" max="500" placeholder="ex : 120">
      </div>
      <div class="fg">
        <label class="lbl" for="f-note">Commentaire (optionnel)</label>
        <textarea id="f-note" rows="2" placeholder="Notes, observations…"></textarea>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-cancel" id="btn-cancel">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
      <button type="button" class="btn btn-delete" id="btn-del" style="display:none">Supprimer cette entrée</button>
    </form>
  </div>
</div>

<script>
  const TYPES = {
    sein_gauche: { label: 'Sein gauche',    emoji: '🤱', cls: 'icon-sein_gauche' },
    sein_droit:  { label: 'Sein droit',     emoji: '🤱', cls: 'icon-sein_droit'  },
    les_deux:    { label: 'Les deux seins', emoji: '🤱', cls: 'icon-les_deux'    },
    biberon:     { label: 'Biberon',        emoji: '🍼', cls: 'icon-biberon'     },
  };

  let entries    = [];
  let selType    = 'sein_gauche';
  let selBibType = 'maternel';
  let editId     = null;
  let statPeriod = 7;
  let statMode   = 'count';

  /* ── Firebase ── */
  firebase.initializeApp({
    apiKey: "AIzaSyClCg1TjiwjaOZNFE7xAKdRyrihY4X8bDc",
    authDomain: "suivi-biberon.firebaseapp.com",
    databaseURL: "https://suivi-biberon-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "suivi-biberon",
    storageBucket: "suivi-biberon.firebasestorage.app",
    messagingSenderId: "602148113728",
    appId: "1:602148113728:web:b0b7b04ae2be0e820a7ea5"
  });

  const db    = firebase.database();
  const dbRef = db.ref('entries');

  db.ref('.info/connected').on('value', snap => {
    const ok = !!snap.val();
    document.getElementById('dot').className      = 'sync-dot' + (ok ? '' : ' off');
    document.getElementById('sync-lbl').textContent = ok ? 'Synchronisé' : 'Hors ligne';
  });

  dbRef.on('value', snap => {
    const data = snap.val() || {};
    entries = Object.entries(data).map(([id, v]) => ({ id, ...v }));
    entries.sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
    render();
    renderStats();
  });

  /* ── Helpers ── */
  function pad(n) { return String(n).padStart(2, '0'); }

  function toInput(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function dateKey(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function fmtDay(iso) {
    const d = new Date(iso), t = new Date(), y = new Date(t);
    y.setDate(y.getDate() - 1);
    if (d.toDateString() === t.toDateString()) return "Aujourd'hui";
    if (d.toDateString() === y.toDateString()) return 'Hier';
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function timeSince(iso) {
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 1)  return "à l'instant";
    if (m < 60) return `il y a ${m} min`;
    const h = Math.floor(m/60), r = m%60;
    return r === 0 ? `il y a ${h}h` : `il y a ${h}h${r}`;
  }

  function getEntryDisplay(e) {
    if (e.type === 'biberon') {
      return e.biberon_type === 'poudre'
        ? { label: 'Biberon poudre',   emoji: '🥛', cls: 'icon-biberon_poudre' }
        : { label: 'Biberon maternel', emoji: '🍼', cls: 'icon-biberon' };
    }
    return TYPES[e.type] || TYPES.sein_gauche;
  }

  function updateHeader() {
    const todayK = dateKey(new Date().toISOString());
    document.getElementById('cnt').textContent = entries.filter(e => dateKey(e.datetime) === todayK).length;
    document.getElementById('ago').textContent = entries.length ? timeSince(entries[0].datetime) : '—';
    const lastPoudre = entries.find(e => e.type === 'biberon' && e.biberon_type === 'poudre');
    document.getElementById('ago-poudre').textContent = lastPoudre ? timeSince(lastPoudre.datetime) : '—';
  }

  /* ── Render journal ── */
  function render() {
    updateHeader();
    const list = document.getElementById('list');
    list.querySelectorAll('.day-group').forEach(el => el.remove());
    document.getElementById('empty').style.display = entries.length ? 'none' : 'block';
    if (!entries.length) return;

    const groups = {};
    entries.forEach(e => { const k = dateKey(e.datetime); (groups[k] = groups[k] || []).push(e); });

    Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(k => {
      const day  = groups[k];
      const wrap = document.createElement('div');
      wrap.className = 'day-group';

      const lbl = document.createElement('div');
      lbl.className   = 'day-label';
      lbl.textContent = `${fmtDay(day[0].datetime)} — ${day.length} tétée${day.length > 1 ? 's' : ''}`;
      wrap.appendChild(lbl);

      day.forEach(e => {
        const cfg  = getEntryDisplay(e);
        const meta = [e.duration ? `${e.duration} min` : '', e.quantity ? `${e.quantity} ml` : ''].filter(Boolean).join(' · ');
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.innerHTML = `
          <div class="entry-icon ${cfg.cls}">${cfg.emoji}</div>
          <div class="entry-body">
            <div class="entry-type">${cfg.label}</div>
            <div class="entry-meta">${meta || '&nbsp;'}</div>
            ${e.comment ? `<div class="entry-comment">${e.comment}</div>` : ''}
          </div>
          <div class="entry-time">${fmtTime(e.datetime)}</div>
        `;
        card.addEventListener('click', () => openEdit(e));
        wrap.appendChild(card);
      });

      list.appendChild(wrap);
    });
  }

  /* ── Stats ── */
  function getDayRange(n) {
    const days = [];
    for (let i = n - 1; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      d.setHours(0, 0, 0, 0);
      days.push(dateKey(d.toISOString()));
    }
    return days;
  }

  function computeDayStats(key) {
    const dayE    = entries.filter(e => dateKey(e.datetime) === key);
    const sein    = dayE.filter(e => e.type !== 'biberon');
    const mats    = dayE.filter(e => e.type === 'biberon' && e.biberon_type !== 'poudre');
    const poudres = dayE.filter(e => e.type === 'biberon' && e.biberon_type === 'poudre');
    return {
      key,
      total:       dayE.length,
      sein:        sein.length,
      maternel:    mats.length,
      poudre:      poudres.length,
      maternel_ml: mats.reduce((s, e)    => s + (e.quantity || 0), 0),
      poudre_ml:   poudres.reduce((s, e) => s + (e.quantity || 0), 0),
    };
  }

  function chartLabel(key) {
    const d = new Date(key + 'T12:00:00');
    return statPeriod <= 7
      ? ['Di','Lu','Ma','Me','Je','Ve','Sa'][d.getDay()]
      : pad(d.getDate());
  }

  function buildSVGChart(dayStats) {
    const BAR_W   = statPeriod <= 7 ? 28 : 16;
    const GAP     = statPeriod <= 7 ? 8  : 4;
    const CHART_H = 120, TOTAL_H = 162, LABEL_H = 26, PAD_L = 28, PAD_R = 8;
    const n       = dayStats.length;
    const W       = PAD_L + n * (BAR_W + GAP) - GAP + PAD_R;
    const baseY   = TOTAL_H - LABEL_H;

    let maxVal = 1;
    if (statMode === 'count') {
      maxVal = Math.max(...dayStats.map(d => d.sein + d.maternel + d.poudre), 1);
    } else {
      maxVal = Math.max(...dayStats.map(d => d.maternel_ml + d.poudre_ml), 1);
    }

    let bars = '', xlabels = '', grid = '';

    const steps = Math.min(maxVal, 4);
    for (let s = 1; s <= steps; s++) {
      const frac = s / steps;
      const y    = (baseY - frac * CHART_H).toFixed(1);
      const val  = Math.round(frac * maxVal);
      grid += `<line x1="${PAD_L - 4}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#dfe6e9" stroke-width="0.7" stroke-dasharray="3,3"/>`;
      grid += `<text x="${PAD_L - 6}" y="${(+y + 3).toFixed(1)}" text-anchor="end" font-size="8" fill="#b2bec3">${val}</text>`;
    }

    dayStats.forEach((d, i) => {
      const x = PAD_L + i * (BAR_W + GAP);
      let y   = baseY;

      const segs = statMode === 'count'
        ? [{ val: d.poudre,    color: '#e17055' }, { val: d.maternel,    color: '#00b894' }, { val: d.sein,     color: '#a29bfe' }]
        : [{ val: d.poudre_ml, color: '#e17055' }, { val: d.maternel_ml, color: '#00b894' }];

      segs.forEach(seg => {
        if (seg.val > 0) {
          const h = Math.max((seg.val / maxVal) * CHART_H, 2);
          y -= h;
          bars += `<rect x="${x}" y="${y.toFixed(1)}" width="${BAR_W}" height="${h.toFixed(1)}" fill="${seg.color}" rx="2"/>`;
        }
      });

      const fs = statPeriod <= 7 ? 10 : 8;
      xlabels += `<text x="${(x + BAR_W / 2).toFixed(1)}" y="${TOTAL_H - 7}" text-anchor="middle" font-size="${fs}" fill="#636e72">${chartLabel(d.key)}</text>`;
    });

    return `<svg width="${W}" height="${TOTAL_H}" xmlns="http://www.w3.org/2000/svg">
      <line x1="${PAD_L - 4}" y1="${baseY - CHART_H}" x2="${PAD_L - 4}" y2="${baseY}" stroke="#dfe6e9" stroke-width="1"/>
      ${grid}${bars}${xlabels}
    </svg>`;
  }

  function renderStats() {
    if (document.getElementById('view-stats').style.display === 'none') return;

    const dayStats = getDayRange(statPeriod).map(computeDayStats);

    document.getElementById('chart-svg').innerHTML = buildSVGChart(dayStats);

    const legendItems = statMode === 'count'
      ? [['#a29bfe','Allaitement'], ['#00b894','Biberon maternel'], ['#e17055','Biberon poudre']]
      : [['#00b894','Biberon maternel'], ['#e17055','Biberon poudre']];
    document.getElementById('chart-legend').innerHTML = legendItems
      .map(([c, l]) => `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${l}</div>`)
      .join('');

    const withData = [...dayStats].reverse().filter(d => d.total > 0);
    document.getElementById('day-cards').innerHTML = withData.length
      ? withData.map(d => {
          const totalMl = d.maternel_ml + d.poudre_ml;
          return `<div class="day-stat-card">
            <div class="dsc-date">${fmtDay(d.key + 'T12:00:00')}</div>
            <div class="dsc-row">
              <div class="dsc-item">
                <div class="dsc-item-label">Total tétées</div>
                <div class="dsc-item-val">${d.total}</div>
              </div>
              ${d.sein > 0 ? `<div class="dsc-item c-sein">
                <div class="dsc-item-label">Allaitement</div>
                <div class="dsc-item-val">${d.sein}×</div>
              </div>` : ''}
              ${d.maternel > 0 ? `<div class="dsc-item c-maternel">
                <div class="dsc-item-label">Bib. maternel</div>
                <div class="dsc-item-val">${d.maternel}× ${d.maternel_ml ? d.maternel_ml + ' ml' : ''}</div>
              </div>` : ''}
              ${d.poudre > 0 ? `<div class="dsc-item c-poudre">
                <div class="dsc-item-label">Bib. poudre</div>
                <div class="dsc-item-val">${d.poudre}× ${d.poudre_ml ? d.poudre_ml + ' ml' : ''}</div>
              </div>` : ''}
              ${totalMl > 0 ? `<div class="dsc-item">
                <div class="dsc-item-label">Volume total</div>
                <div class="dsc-item-val">${totalMl} ml</div>
              </div>` : ''}
            </div>
          </div>`;
        }).join('')
      : '<p style="text-align:center;color:var(--muted);padding:40px 0">Aucune donnée sur cette période</p>';
  }

  /* ── Navigation ── */
  function showTab(tab) {
    const isJournal = tab === 'journal';
    document.getElementById('view-journal').style.display = isJournal ? 'block' : 'none';
    document.getElementById('view-stats').style.display   = isJournal ? 'none'  : 'block';
    document.getElementById('fab').style.display          = isJournal ? 'flex'  : 'none';
    document.getElementById('nav-journal').classList.toggle('active', isJournal);
    document.getElementById('nav-stats').classList.toggle('active', !isJournal);
    if (!isJournal) renderStats();
  }

  document.getElementById('nav-journal').addEventListener('click', () => showTab('journal'));
  document.getElementById('nav-stats').addEventListener('click',   () => showTab('stats'));

  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      statPeriod = +btn.dataset.period;
      document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderStats();
    });
  });

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      statMode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderStats();
    });
  });

  /* ── Modal ── */
  function openAdd() {
    editId = null;
    document.getElementById('modal-title').textContent = 'Nouvelle tétée';
    document.getElementById('f-dt').value   = toInput(new Date().toISOString());
    document.getElementById('f-dur').value  = '';
    document.getElementById('f-qty').value  = '';
    document.getElementById('f-note').value = '';
    document.getElementById('btn-del').style.display = 'none';
    setType('sein_gauche');
    document.getElementById('overlay').classList.add('open');
  }

  function openEdit(e) {
    editId = e.id;
    document.getElementById('modal-title').textContent = 'Modifier';
    document.getElementById('f-dt').value   = toInput(e.datetime);
    document.getElementById('f-dur').value  = e.duration || '';
    document.getElementById('f-qty').value  = e.quantity  || '';
    document.getElementById('f-note').value = e.comment   || '';
    document.getElementById('btn-del').style.display = 'block';
    setType(e.type || 'sein_gauche');
    if (e.type === 'biberon') setBibType(e.biberon_type || 'maternel');
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }

  function setType(t) {
    selType = t;
    document.querySelectorAll('.type-btn').forEach(b => {
      b.className = 'type-btn';
      if (b.dataset.type === t) b.classList.add(`sel-${t}`);
    });
    document.getElementById('g-dur').classList.toggle('show',     t !== 'biberon');
    document.getElementById('g-qty').classList.toggle('show',     t === 'biberon');
    document.getElementById('g-bib-type').classList.toggle('show', t === 'biberon');
    if (t === 'biberon') setBibType(selBibType);
  }

  function setBibType(bt) {
    selBibType = bt;
    document.querySelectorAll('.bib-btn').forEach(b => {
      b.className = 'bib-btn';
      if (b.dataset.bib === bt) b.classList.add(`sel-${bt}`);
    });
  }

  /* ── Form ── */
  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    const dtVal = document.getElementById('f-dt').value;
    if (!dtVal) return;

    const data = {
      type:         selType,
      datetime:     new Date(dtVal).toISOString(),
      biberon_type: selType === 'biberon' ? selBibType : null,
      duration:     document.getElementById('f-dur').value ? +document.getElementById('f-dur').value : null,
      quantity:     document.getElementById('f-qty').value ? +document.getElementById('f-qty').value : null,
      comment:      document.getElementById('f-note').value.trim() || null,
    };

    if (editId) {
      dbRef.child(editId).update(data);
    } else {
      dbRef.push(data);
    }
    closeModal();
  });

  document.getElementById('btn-del').addEventListener('click', () => {
    if (!confirm('Supprimer cette entrée ?')) return;
    dbRef.child(editId).remove();
    closeModal();
  });

  document.getElementById('fab').addEventListener('click', openAdd);
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });
  document.getElementById('type-grid').addEventListener('click', e => {
    const b = e.target.closest('.type-btn');
    if (b) setType(b.dataset.type);
  });
  document.getElementById('bib-type-grid').addEventListener('click', e => {
    const b = e.target.closest('.bib-btn');
    if (b) setBibType(b.dataset.bib);
  });

  setInterval(updateHeader, 30000);
</script>
</body>
</html>
