<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tétées</title>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #6c5ce7;
      --bg: #f0effe;
      --card: #ffffff;
      --text: #2d3436;
      --muted: #636e72;
      --border: #dfe6e9;
      --r: 16px;
      --shadow: 0 4px 20px rgba(108,92,231,.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }

    header {
      background: var(--primary); color: #fff;
      padding: 24px 16px 28px; text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 800; }
    .stats-bar { display: flex; justify-content: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
    .chip { background: rgba(255,255,255,.22); border-radius: 20px; padding: 6px 14px; font-size: .83rem; }
    .chip strong { font-weight: 700; }

    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--primary); color: #fff; font-size: 2rem; border: none;
      box-shadow: 0 6px 24px rgba(108,92,231,.45);
      cursor: pointer; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s;
    }
    .fab:active { transform: scale(.92); }

    main { padding: 16px; max-width: 600px; margin: 0 auto; }
    .day-group { margin-bottom: 22px; }
    .day-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; padding: 0 4px; }

    .entry-card {
      background: var(--card); border-radius: var(--r);
      padding: 14px 16px; margin-bottom: 8px;
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 13px;
      cursor: pointer; transition: transform .1s;
    }
    .entry-card:active { transform: scale(.98); }
    .entry-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 1.45rem; flex-shrink: 0; }
    .icon-sein_gauche { background: #ffeef5; }
    .icon-sein_droit  { background: #f0effe; }
    .icon-les_deux    { background: #fff9e6; }
    .icon-biberon     { background: #e6faf5; }
    .entry-body { flex: 1; min-width: 0; }
    .entry-type { font-weight: 700; font-size: .95rem; margin-bottom: 2px; }
    .entry-meta { font-size: .81rem; color: var(--muted); }
    .entry-comment { font-size: .81rem; color: var(--muted); font-style: italic; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-time { font-size: 1.15rem; font-weight: 800; color: var(--primary); flex-shrink: 0; }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.38);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 12px 20px 40px; width: 100%; max-width: 600px;
      transform: translateY(110%);
      transition: transform .3s cubic-bezier(.34,1.4,.64,1);
      max-height: 92vh; overflow-y: auto;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 8px auto 20px; }
    .sheet h2 { font-size: 1.15rem; font-weight: 800; text-align: center; margin-bottom: 22px; }

    .fg { margin-bottom: 16px; }
    .lbl { display: block; font-size: .76rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
    input[type="datetime-local"], input[type="number"], textarea {
      width: 100%; padding: 13px 14px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 1rem; font-family: inherit; color: var(--text);
      background: #fff; transition: border-color .15s; -webkit-appearance: none; appearance: none;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: none; }

    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .type-btn {
      padding: 13px 8px; border: 2px solid var(--border); border-radius: 13px;
      background: #fff; cursor: pointer; font-family: inherit;
      font-size: .83rem; font-weight: 600; color: var(--text);
      transition: all .14s; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .type-btn span { font-size: 1.5rem; }
    .type-btn.sel-sein_gauche { border-color: #fd79a8; background: #ffeef5; color: #c0296a; }
    .type-btn.sel-sein_droit  { border-color: #a29bfe; background: #f0effe; color: #4a3abf; }
    .type-btn.sel-les_deux    { border-color: #e0ac00; background: #fff9e6; color: #7a5800; }
    .type-btn.sel-biberon     { border-color: #00b894; background: #e6faf5; color: #006e59; }

    .cond { display: none; }
    .cond.show { display: block; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 13px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-cancel  { background: var(--bg); color: var(--text); }
    .btn-delete  { width: 100%; margin-top: 10px; background: #fff0f0; color: #c0392b; }

    .sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00b894; margin-right: 6px; vertical-align: middle; }
    .sync-dot.off { background: #fdcb6e; }

    .empty { text-align: center; padding: 70px 20px; color: var(--muted); }
    .empty .ei { font-size: 4rem; margin-bottom: 16px; }
    .empty p { font-size: 1rem; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <h1>🍼 Tétées</h1>
  <div class="stats-bar">
    <div class="chip">Aujourd'hui&nbsp;: <strong id="cnt">0</strong></div>
    <div class="chip">Dernière&nbsp;: <strong id="ago">—</strong></div>
    <div class="chip"><span class="sync-dot off" id="dot"></span><span id="sync-lbl">Connexion…</span></div>
  </div>
</header>

<main id="list">
  <div class="empty" id="empty">
    <div class="ei">🤱</div>
    <p>Aucune tétée enregistrée.<br>Appuyez sur <strong>+</strong> pour commencer !</p>
  </div>
</main>

<button class="fab" id="fab">+</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="modal-title">Nouvelle tétée</h2>
    <form id="form" novalidate>
      <div class="fg">
        <div class="lbl">Type</div>
        <div class="type-grid" id="type-grid">
          <button type="button" class="type-btn" data-type="sein_gauche"><span>🤱</span>Sein gauche</button>
          <button type="button" class="type-btn" data-type="sein_droit"><span>🤱</span>Sein droit</button>
          <button type="button" class="type-btn" data-type="les_deux"><span>🤱</span>Les deux</button>
          <button type="button" class="type-btn" data-type="biberon"><span>🍼</span>Biberon</button>
        </div>
      </div>
      <div class="fg">
        <label class="lbl" for="f-dt">Date et heure</label>
        <input type="datetime-local" id="f-dt" required>
      </div>
      <div class="fg cond" id="g-dur">
        <label class="lbl" for="f-dur">Durée (minutes)</label>
        <input type="number" id="f-dur" min="1" max="120" placeholder="ex : 20">
      </div>
      <div class="fg cond" id="g-qty">
        <label class="lbl" for="f-qty">Quantité (ml)</label>
        <input type="number" id="f-qty" min="1" max="500" placeholder="ex : 120">
      </div>
      <div class="fg">
        <label class="lbl" for="f-note">Commentaire (optionnel)</label>
        <textarea id="f-note" rows="2" placeholder="Notes, observations…"></textarea>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-cancel" id="btn-cancel">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
      <button type="button" class="btn btn-delete" id="btn-del" style="display:none">Supprimer cette entrée</button>
    </form>
  </div>
</div>

<script>
  const TYPES = {
    sein_gauche: { label: 'Sein gauche',    emoji: '🤱', cls: 'icon-sein_gauche' },
    sein_droit:  { label: 'Sein droit',     emoji: '🤱', cls: 'icon-sein_droit'  },
    les_deux:    { label: 'Les deux seins', emoji: '🤱', cls: 'icon-les_deux'    },
    biberon:     { label: 'Biberon',        emoji: '🍼', cls: 'icon-biberon'     },
  };

  let entries = [];
  let selType = 'sein_gauche';
  let editId  = null;

  /* ── Firebase ── */
  firebase.initializeApp({
    apiKey: "AIzaSyClCg1TjiwjaOZNFE7xAKdRyrihY4X8bDc",
    authDomain: "suivi-biberon.firebaseapp.com",
    databaseURL: "https://suivi-biberon-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "suivi-biberon",
    storageBucket: "suivi-biberon.firebasestorage.app",
    messagingSenderId: "602148113728",
    appId: "1:602148113728:web:b0b7b04ae2be0e820a7ea5"
  });

  const db    = firebase.database();
  const dbRef = db.ref('entries');

  db.ref('.info/connected').on('value', snap => {
    const ok = !!snap.val();
    document.getElementById('dot').className = 'sync-dot' + (ok ? '' : ' off');
    document.getElementById('sync-lbl').textContent = ok ? 'Synchronisé' : 'Hors ligne';
  });

  dbRef.on('value', snap => {
    const data = snap.val() || {};
    entries = Object.entries(data).map(([id, v]) => ({ id, ...v }));
    entries.sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
    render();
  });

  /* ── Helpers ── */
  function pad(n) { return String(n).padStart(2, '0'); }
  function toInput(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function fmtTime(iso) { return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
  function dateKey(iso) { const d = new Date(iso); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function fmtDay(iso) {
    const d = new Date(iso), t = new Date(), y = new Date(t);
    y.setDate(y.getDate() - 1);
    if (d.toDateString() === t.toDateString()) return "Aujourd'hui";
    if (d.toDateString() === y.toDateString()) return 'Hier';
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  function timeSince(iso) {
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 1)  return "à l'instant";
    if (m < 60) return `il y a ${m} min`;
    const h = Math.floor(m/60), r = m%60;
    return r === 0 ? `il y a ${h}h` : `il y a ${h}h${r}`;
  }

  /* ── Render ── */
  function render() {
    const list   = document.getElementById('list');
    const todayK = dateKey(new Date().toISOString());
    document.getElementById('cnt').textContent = entries.filter(e => dateKey(e.datetime) === todayK).length;
    document.getElementById('ago').textContent = entries.length ? timeSince(entries[0].datetime) : '—';

    list.querySelectorAll('.day-group').forEach(el => el.remove());
    document.getElementById('empty').style.display = entries.length ? 'none' : 'block';
    if (!entries.length) return;

    const groups = {};
    entries.forEach(e => { const k = dateKey(e.datetime); (groups[k] = groups[k] || []).push(e); });

    Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(k => {
      const day  = groups[k];
      const wrap = document.createElement('div');
      wrap.className = 'day-group';

      const lbl = document.createElement('div');
      lbl.className = 'day-label';
      lbl.textContent = `${fmtDay(day[0].datetime)} — ${day.length} tétée${day.length > 1 ? 's' : ''}`;
      wrap.appendChild(lbl);

      day.forEach(e => {
        const cfg  = TYPES[e.type] || TYPES.sein_gauche;
        const meta = [e.duration ? `${e.duration} min` : '', e.quantity ? `${e.quantity} ml` : ''].filter(Boolean).join(' · ');
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.innerHTML = `
          <div class="entry-icon ${cfg.cls}">${cfg.emoji}</div>
          <div class="entry-body">
            <div class="entry-type">${cfg.label}</div>
            <div class="entry-meta">${meta || '&nbsp;'}</div>
            ${e.comment ? `<div class="entry-comment">${e.comment}</div>` : ''}
          </div>
          <div class="entry-time">${fmtTime(e.datetime)}</div>
        `;
        card.addEventListener('click', () => openEdit(e));
        wrap.appendChild(card);
      });

      list.appendChild(wrap);
    });
  }

  /* ── Modal ── */
  function openAdd() {
    editId = null;
    document.getElementById('modal-title').textContent = 'Nouvelle tétée';
    document.getElementById('f-dt').value  = toInput(new Date().toISOString());
    document.getElementById('f-dur').value = '';
    document.getElementById('f-qty').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('btn-del').style.display = 'none';
    setType('sein_gauche');
    document.getElementById('overlay').classList.add('open');
  }

  function openEdit(e) {
    editId = e.id;
    document.getElementById('modal-title').textContent = 'Modifier';
    document.getElementById('f-dt').value   = toInput(e.datetime);
    document.getElementById('f-dur').value  = e.duration || '';
    document.getElementById('f-qty').value  = e.quantity  || '';
    document.getElementById('f-note').value = e.comment   || '';
    document.getElementById('btn-del').style.display = 'block';
    setType(e.type || 'sein_gauche');
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }

  function setType(t) {
    selType = t;
    document.querySelectorAll('.type-btn').forEach(b => {
      b.className = 'type-btn';
      if (b.dataset.type === t) b.classList.add(`sel-${t}`);
    });
    document.getElementById('g-dur').classList.toggle('show', t !== 'biberon');
    document.getElementById('g-qty').classList.toggle('show', t === 'biberon');
  }

  /* ── Form ── */
  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    const dtVal = document.getElementById('f-dt').value;
    if (!dtVal) return;

    const data = {
      type:     selType,
      datetime: new Date(dtVal).toISOString(),
      duration: document.getElementById('f-dur').value  ? +document.getElementById('f-dur').value  : null,
      quantity: document.getElementById('f-qty').value  ? +document.getElementById('f-qty').value  : null,
      comment:  document.getElementById('f-note').value.trim() || null,
    };

    if (editId) {
      dbRef.child(editId).update(data);
    } else {
      dbRef.push(data);
    }

    closeModal();
  });

  document.getElementById('btn-del').addEventListener('click', () => {
    if (!confirm('Supprimer cette entrée ?')) return;
    dbRef.child(editId).remove();
    closeModal();
  });

  document.getElementById('fab').addEventListener('click', openAdd);
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });
  document.getElementById('type-grid').addEventListener('click', e => {
    const b = e.target.closest('.type-btn');
    if (b) setType(b.dataset.type);
  });

  setInterval(() => {
    if (entries.length) document.getElementById('ago').textContent = timeSince(entries[0].datetime);
  }, 30000);
</script>
</body>
</html>
